name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Find backend project file
        id: find_project
        shell: bash
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "No .csproj file found"
            exit 1
          fi

          echo "Using project file: $PROJECT_FILE"
          echo "project_file=$PROJECT_FILE" >> $GITHUB_OUTPUT

      - name: Restore backend
        shell: bash
        run: |
          dotnet restore "${{ steps.find_project.outputs.project_file }}"

      - name: Publish backend
        shell: bash
        run: |
          PROJECT_FILE="${{ steps.find_project.outputs.project_file }}"
          PROJECT_NAME=$(basename "$PROJECT_FILE" .csproj)

          dotnet publish "$PROJECT_FILE" -c Release -o ./publish --no-restore

          if [ -f "./publish/$PROJECT_NAME.dll" ]; then
            cp "./publish/$PROJECT_NAME.dll" "./publish/app.dll"
          else
            MAIN_DLL=$(find ./publish -maxdepth 1 -name "*.dll" | head -n 1)

            if [ -z "$MAIN_DLL" ]; then
              echo "No DLL found in publish folder"
              exit 1
            fi

            cp "$MAIN_DLL" "./publish/app.dll"
          fi

          ls -la ./publish

      - name: Prepare backend folder on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Preparing backend folder..."
            sudo systemctl stop crm-backend || true
            sudo mkdir -p /var/www/crm-backend
            sudo rm -rf /var/www/crm-backend/*
            sudo chown -R deployer:www-data /var/www/crm-backend
            sudo chmod -R 775 /var/www/crm-backend

      - name: Copy backend files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          source: "./publish/*"
          target: "/var/www/crm-backend"
          strip_components: 1

      - name: Restart backend service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Fixing backend permissions..."
            sudo chown -R www-data:www-data /var/www/crm-backend
            sudo chmod -R 775 /var/www/crm-backend

            echo "Restarting backend service..."
            sudo systemctl restart crm-backend

            echo "Waiting for backend..."
            sleep 5

            echo "Backend service status:"
            sudo systemctl status crm-backend --no-pager

            echo "Checking backend internal port 5050:"
            sudo ss -tulpn | grep ':5050' || true

            echo "Checking Nginx public API port 5000:"
            sudo ss -tulpn | grep ':5000' || true