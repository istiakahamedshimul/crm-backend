name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Find backend project file
        id: find_project
        shell: bash
        run: |
          set -e

          PROJECT_FILE=$(find . -name "*.csproj" -not -path "*/obj/*" -not -path "*/bin/*" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "No .csproj file found."
            exit 1
          fi

          PROJECT_NAME=$(basename "$PROJECT_FILE" .csproj)

          echo "Using project file: $PROJECT_FILE"
          echo "Project name: $PROJECT_NAME"

          echo "project_file=$PROJECT_FILE" >> "$GITHUB_OUTPUT"
          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Restore backend
        shell: bash
        run: |
          set -e
          dotnet restore "${{ steps.find_project.outputs.project_file }}"

      - name: Install EF Core CLI
        shell: bash
        run: |
          set -e
          dotnet tool install --global dotnet-ef --version "9.0.*"

      - name: Publish backend
        shell: bash
        run: |
          set -e

          PROJECT_FILE="${{ steps.find_project.outputs.project_file }}"
          PROJECT_NAME="${{ steps.find_project.outputs.project_name }}"

          echo "Publishing project: $PROJECT_FILE"
          echo "Project name: $PROJECT_NAME"

          rm -rf ./publish
          mkdir -p ./publish

          dotnet publish "$PROJECT_FILE" \
            --configuration Release \
            --output ./publish \
            --no-restore

          echo "Creating production migration bundle..."

          dotnet ef migrations bundle \
            --project "$PROJECT_FILE" \
            --startup-project "$PROJECT_FILE" \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            --output ./publish/efbundle \
            --force

          chmod +x ./publish/efbundle

          echo "$PROJECT_NAME" > ./publish/project_name.txt

          echo "Publish folder contents:"
          ls -la ./publish

          test -f "./publish/${PROJECT_NAME}.dll" || {
            echo "Missing ${PROJECT_NAME}.dll"
            exit 1
          }

          test -f "./publish/${PROJECT_NAME}.runtimeconfig.json" || {
            echo "Missing ${PROJECT_NAME}.runtimeconfig.json"
            exit 1
          }

          test -f "./publish/${PROJECT_NAME}.deps.json" || {
            echo "Missing ${PROJECT_NAME}.deps.json"
            exit 1
          }

          test -f "./publish/efbundle" || {
            echo "Missing EF migration bundle."
            exit 1
          }

      - name: Prepare temporary upload folder on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            rm -rf /tmp/crm-backend-upload
            mkdir -p /tmp/crm-backend-upload
            chmod 755 /tmp/crm-backend-upload

      - name: Upload backend files to temporary folder
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          source: "./publish/*"
          target: "/tmp/crm-backend-upload"
          strip_components: 1

      - name: Deploy backend and restart service
        uses: appleboy/ssh-action@v1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          envs: JWT_SECRET
          script: |
            set -e

            SUDO_PASSWORD='${{ secrets.SERVER_PASS }}'
            BACKEND_DIRECTORY="/var/www/crm-backend"
            UPLOAD_DIRECTORY="/tmp/crm-backend-upload"
            BUNDLE_EXTRACT_DIRECTORY="/var/tmp/crm-backend-bundle"
            ENVIRONMENT_FILE="/etc/crm-backend.env"
            SERVICE_FILE="/etc/systemd/system/crm-backend.service"

            if [ "${#JWT_SECRET}" -lt 32 ]; then
              echo "JWT_SECRET must exist in GitHub repository secrets and contain at least 32 characters."
              exit 1
            fi

            run_sudo() {
              echo "$SUDO_PASSWORD" | sudo -S "$@"
            }

            if [ ! -f "$UPLOAD_DIRECTORY/project_name.txt" ]; then
              echo "project_name.txt was not uploaded."
              exit 1
            fi

            PROJECT_NAME=$(tr -d '\r\n' < "$UPLOAD_DIRECTORY/project_name.txt")

            if [ -z "$PROJECT_NAME" ]; then
              echo "Project name is empty."
              exit 1
            fi

            if [ ! -f "$UPLOAD_DIRECTORY/${PROJECT_NAME}.dll" ]; then
              echo "Uploaded backend DLL was not found."
              exit 1
            fi

            if [ ! -f "$UPLOAD_DIRECTORY/efbundle" ]; then
              echo "Uploaded EF migration bundle was not found."
              exit 1
            fi

            echo "Stopping backend service..."
            run_sudo systemctl stop crm-backend || true

            echo "Preparing backend directory..."
            run_sudo mkdir -p "$BACKEND_DIRECTORY"
            run_sudo find "$BACKEND_DIRECTORY" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            echo "Copying uploaded files..."
            run_sudo cp -a "$UPLOAD_DIRECTORY"/. "$BACKEND_DIRECTORY"/

            echo "Creating bundle extraction directory..."
            run_sudo mkdir -p "$BUNDLE_EXTRACT_DIRECTORY"
            run_sudo chown -R www-data:www-data "$BUNDLE_EXTRACT_DIRECTORY"
            run_sudo chmod 750 "$BUNDLE_EXTRACT_DIRECTORY"

            echo "Creating environment file..."

            cat > /tmp/crm-backend.env <<EOF
            ASPNETCORE_ENVIRONMENT=Production
            DOTNET_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://127.0.0.1:5050
            DOTNET_BUNDLE_EXTRACT_BASE_DIR=$BUNDLE_EXTRACT_DIRECTORY
            DOTNET_PRINT_TELEMETRY_MESSAGE=false
            DOTNET_CLI_TELEMETRY_OPTOUT=1
            ConnectionStrings__Default=Server=localhost;Port=3306;Database=real_estate_crm;User=crmuser;Password=${{ secrets.SERVER_PASS }};AllowPublicKeyRetrieval=true;
            ConnectionStrings__DefaultConnection=Server=localhost;Port=3306;Database=real_estate_crm;User=crmuser;Password=${{ secrets.SERVER_PASS }};AllowPublicKeyRetrieval=true;
            Jwt__Issuer=RealEstateCrm
            Jwt__Audience=RealEstateCrmClients
            Jwt__Secret=$JWT_SECRET
            Jwt__Key=$JWT_SECRET
            Jwt__ExpiryMinutes=1440
            EOF

            run_sudo cp /tmp/crm-backend.env "$ENVIRONMENT_FILE"
            run_sudo chown root:root "$ENVIRONMENT_FILE"
            run_sudo chmod 600 "$ENVIRONMENT_FILE"
            rm -f /tmp/crm-backend.env

            echo "Creating systemd service..."

            cat > /tmp/crm-backend.service <<EOF
            [Unit]
            Description=CRM ASP.NET Core Backend
            After=network.target mysql.service
            Wants=mysql.service

            [Service]
            Type=simple
            WorkingDirectory=$BACKEND_DIRECTORY
            ExecStart=/usr/bin/dotnet $BACKEND_DIRECTORY/${PROJECT_NAME}.dll

            User=www-data
            Group=www-data

            EnvironmentFile=$ENVIRONMENT_FILE
            Environment=DOTNET_BUNDLE_EXTRACT_BASE_DIR=$BUNDLE_EXTRACT_DIRECTORY

            Restart=always
            RestartSec=10
            KillSignal=SIGINT
            SyslogIdentifier=crm-backend

            NoNewPrivileges=true
            PrivateTmp=true

            [Install]
            WantedBy=multi-user.target
            EOF

            run_sudo cp /tmp/crm-backend.service "$SERVICE_FILE"
            run_sudo chown root:root "$SERVICE_FILE"
            run_sudo chmod 644 "$SERVICE_FILE"
            rm -f /tmp/crm-backend.service

            echo "Reloading systemd..."
            run_sudo systemctl daemon-reload

            echo "Ensuring MySQL database and user exist..."

            run_sudo mysql -e "
              CREATE DATABASE IF NOT EXISTS real_estate_crm
              CHARACTER SET utf8mb4
              COLLATE utf8mb4_unicode_ci;
            "

            run_sudo mysql -e "
              CREATE USER IF NOT EXISTS 'crmuser'@'localhost'
              IDENTIFIED BY '${{ secrets.SERVER_PASS }}';
            "

            run_sudo mysql -e "
              ALTER USER 'crmuser'@'localhost'
              IDENTIFIED BY '${{ secrets.SERVER_PASS }}';
            "

            run_sudo mysql -e "
              GRANT ALL PRIVILEGES
              ON real_estate_crm.*
              TO 'crmuser'@'localhost';
            "

            run_sudo mysql -e "FLUSH PRIVILEGES;"

            echo "Fixing permissions..."
            run_sudo chown -R www-data:www-data "$BACKEND_DIRECTORY"
            run_sudo find "$BACKEND_DIRECTORY" -type d -exec chmod 755 {} \;
            run_sudo find "$BACKEND_DIRECTORY" -type f -exec chmod 644 {} \;
            run_sudo chmod 755 "$BACKEND_DIRECTORY/efbundle"

            echo "Applying pending database migrations..."

            MIGRATION_UNIT="crm-backend-migration-${{ github.run_id }}-${{ github.run_attempt }}"

            run_sudo systemd-run \
              --quiet \
              --wait \
              --pipe \
              --collect \
              --unit="$MIGRATION_UNIT" \
              --property="User=www-data" \
              --property="Group=www-data" \
              --property="WorkingDirectory=$BACKEND_DIRECTORY" \
              --property="EnvironmentFile=$ENVIRONMENT_FILE" \
              --property="Environment=DOTNET_BUNDLE_EXTRACT_BASE_DIR=$BUNDLE_EXTRACT_DIRECTORY" \
              "$BACKEND_DIRECTORY/efbundle" --verbose

            echo "Database migrations applied successfully."

            echo "Enabling backend service..."
            run_sudo systemctl enable crm-backend

            echo "Restarting backend service..."
            run_sudo systemctl restart crm-backend

            echo "Waiting for backend..."

            BACKEND_READY=false

            for ATTEMPT in $(seq 1 12); do
              if curl \
                --silent \
                --show-error \
                --fail \
                --max-time 5 \
                http://127.0.0.1:5050/health > /dev/null 2>&1; then

                BACKEND_READY=true
                echo "Backend responded successfully."
                break
              fi

              echo "Backend is not ready. Attempt $ATTEMPT of 12."
              sleep 5
            done

            echo "Backend service status:"
            run_sudo systemctl status crm-backend --no-pager || true

            echo "Checking port 5050:"
            run_sudo ss -tulpn | grep ':5050' || true

            echo "Checking Nginx port 5000:"
            run_sudo ss -tulpn | grep ':5000' || true

            echo "Testing backend directly:"
            curl -i --max-time 10 http://127.0.0.1:5050/health || true

            echo "Testing backend through Nginx:"
            curl -i --max-time 10 http://127.0.0.1:5000/health || true

            echo "Recent backend logs:"
            run_sudo journalctl -u crm-backend -n 60 --no-pager || true

            if [ "$BACKEND_READY" != "true" ]; then
              echo "Backend failed to become ready."
              exit 1
            fi

            rm -rf "$UPLOAD_DIRECTORY"

            echo "Backend deployment completed successfully."
