name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Find backend project file
        id: find_project
        shell: bash
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "No .csproj file found"
            exit 1
          fi

          PROJECT_NAME=$(basename "$PROJECT_FILE" .csproj)

          echo "Using project file: $PROJECT_FILE"
          echo "Project name: $PROJECT_NAME"

          echo "project_file=$PROJECT_FILE" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Restore backend
        shell: bash
        run: |
          dotnet restore "${{ steps.find_project.outputs.project_file }}"

      - name: Publish backend
        shell: bash
        run: |
          PROJECT_FILE="${{ steps.find_project.outputs.project_file }}"
          PROJECT_NAME="${{ steps.find_project.outputs.project_name }}"

          echo "Publishing project: $PROJECT_FILE"
          echo "Project name: $PROJECT_NAME"

          dotnet publish "$PROJECT_FILE" -c Release -o ./publish --no-restore

          echo "$PROJECT_NAME" > ./publish/project_name.txt

          echo "Publish folder:"
          ls -la ./publish

          echo "Checking required runtime files:"
          ls -la ./publish | grep -E "$PROJECT_NAME.dll|$PROJECT_NAME.runtimeconfig.json|$PROJECT_NAME.deps.json"

      - name: Prepare temporary upload folder on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Preparing temporary upload folder..."
            rm -rf /tmp/crm-backend-upload
            mkdir -p /tmp/crm-backend-upload
            chmod 777 /tmp/crm-backend-upload

      - name: Upload backend files to temporary folder
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          source: "./publish/*"
          target: "/tmp/crm-backend-upload"
          strip_components: 1

      - name: Move backend files and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "Stopping backend service..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl stop crm-backend || true

            echo "Preparing backend folder..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mkdir -p /var/www/crm-backend
            echo "${{ secrets.SERVER_PASS }}" | sudo -S rm -rf /var/www/crm-backend/*

            echo "Copying uploaded files to backend folder..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S cp -a /tmp/crm-backend-upload/. /var/www/crm-backend/

            echo "Reading project name..."
            PROJECT_NAME=$(cat /tmp/crm-backend-upload/project_name.txt)
            echo "Project name is: $PROJECT_NAME"

            echo "Creating correct backend environment file..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S tee /etc/crm-backend.env > /dev/null <<EOF
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://127.0.0.1:5050
            ConnectionStrings__Default=Server=localhost;Port=3306;Database=real_estate_crm;User=crmuser;Password=${{ secrets.SERVER_PASS }};AllowPublicKeyRetrieval=true;
            ConnectionStrings__DefaultConnection=Server=localhost;Port=3306;Database=real_estate_crm;User=crmuser;Password=${{ secrets.SERVER_PASS }};AllowPublicKeyRetrieval=true;
            Jwt__Issuer=RealEstateCrm
            Jwt__Audience=RealEstateCrmClients
            Jwt__Secret=change-this-dev-secret-before-production-please
            Jwt__Key=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_MIN_32_CHARS
            Jwt__ExpiryMinutes=1440
            EOF

            echo "${{ secrets.SERVER_PASS }}" | sudo -S chmod 600 /etc/crm-backend.env
            echo "${{ secrets.SERVER_PASS }}" | sudo -S chown root:root /etc/crm-backend.env

            echo "Creating correct systemd service..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S tee /etc/systemd/system/crm-backend.service > /dev/null <<EOF
            [Unit]
            Description=CrmServer ASP.NET Core Backend
            After=network.target mysql.service

            [Service]
            WorkingDirectory=/var/www/crm-backend
            ExecStart=/usr/bin/dotnet /var/www/crm-backend/${PROJECT_NAME}.dll
            Restart=always
            RestartSec=10
            KillSignal=SIGINT
            SyslogIdentifier=crm-backend
            User=www-data
            EnvironmentFile=/etc/crm-backend.env
            Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false

            [Install]
            WantedBy=multi-user.target
            EOF

            echo "Ensuring MySQL database and user exist..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mysql -e "CREATE DATABASE IF NOT EXISTS real_estate_crm CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mysql -e "CREATE USER IF NOT EXISTS 'crmuser'@'localhost' IDENTIFIED BY '${{ secrets.SERVER_PASS }}';"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mysql -e "ALTER USER 'crmuser'@'localhost' IDENTIFIED BY '${{ secrets.SERVER_PASS }}';"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mysql -e "GRANT ALL PRIVILEGES ON real_estate_crm.* TO 'crmuser'@'localhost';"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S mysql -e "FLUSH PRIVILEGES;"

            echo "Fixing backend permissions..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S chown -R www-data:www-data /var/www/crm-backend
            echo "${{ secrets.SERVER_PASS }}" | sudo -S chmod -R 775 /var/www/crm-backend

            echo "Reloading systemd..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl daemon-reload
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl enable crm-backend

            echo "Restarting backend service..."
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl restart crm-backend

            echo "Waiting for backend..."
            sleep 8

            echo "Backend service status:"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S systemctl status crm-backend --no-pager || true

            echo "Checking backend internal port 5050:"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S ss -tulpn | grep ':5050' || true

            echo "Checking Nginx public API port 5000:"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S ss -tulpn | grep ':5000' || true

            echo "Testing backend API locally:"
            curl -i http://127.0.0.1:5050/api || true

            echo "Testing backend API through Nginx:"
            curl -i http://127.0.0.1:5000/api || true

            echo "Last backend logs:"
            echo "${{ secrets.SERVER_PASS }}" | sudo -S journalctl -u crm-backend -n 40 --no-pager || true